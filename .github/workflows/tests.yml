name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: link_arch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d link_arch"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/link_arch
      BETTER_AUTH_SECRET: test-secret-for-ci
      BASE_URL: http://localhost:3000
      WEB_URL: http://localhost:3001
      FORWARD_TIMEOUT_MS: "5000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run migrations
        working-directory: packages/db
        run: bun run src/migrate.ts

      - name: Run API tests
        working-directory: apps/api
        run: bun test
